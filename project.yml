name: DailyBell

options:
  bundleIdPrefix: com.dailybell
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  DailyBell:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Assets.xcassets
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: DailyBell
        CFBundleName: DailyBell
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dailybell.app
        PRODUCT_NAME: DailyBell
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Unsigned build (signing handled later by KSign on device)
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""

schemes:
  DailyBell:
    build:
      targets:
        DailyBell: all
    run:
      config: Debug
    archive:
      config: Release

name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on:  macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project DailyBell.xcodeproj \
            -scheme DailyBell \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/DailyBell.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"; exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr DailyBell.ipa Payload
          rm -rf Payload
          echo "Built IPA:" && ls -lh DailyBell.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyBell-unsigned-ipa
          path: DailyBell.ipa
          if-no-files-found: error
